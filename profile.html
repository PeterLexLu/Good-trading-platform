<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的 - SGC-丰盛有鱼</title>
    <link rel="stylesheet" href="./styles/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html">
        <span class="brand-mark">SGC</span>
        <span>丰盛有鱼</span>
      </a>
      <nav class="site-nav">
        <a href="./index.html">首页</a>
        <a href="./idle.html">闲置</a>
        <a href="./wish.html">心愿池</a>
        <a href="./messages.html">消息</a>
        <a class="active" href="./profile.html">我的</a>
      </nav>
      <button class="login-chip" id="openLogin">微信扫码登录</button>
    </header>

    <main class="page-shell">
      <!-- 我的主页复用发布者主页样式，保证“看自己”和“看别人”的体验一致。 -->
      <section class="publisher-profile" id="myProfile"></section>

      <section class="profile-actions">
        <button class="primary-btn" id="profileLogin">微信扫码登录</button>
        <button class="secondary-btn hidden" id="logoutBtn">退出登录</button>
        <button class="secondary-btn" id="exportData">导出演示数据</button>
        <button class="secondary-btn" id="clearDemoData">清空演示数据</button>
        <button class="secondary-btn">反馈建议</button>
      </section>

      <section class="publisher-section">
        <div class="section-head">
          <div>
            <p>我的内容</p>
            <h1>我发布的闲置和心愿</h1>
          </div>
        </div>
        <div class="card-grid" id="myItems"></div>
      </section>
    </main>

    <div class="modal hidden" id="loginModal" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
      <div class="modal-panel login-panel">
        <div class="modal-head">
          <h2 id="loginTitle">微信扫码登录</h2>
          <button type="button" class="icon-btn" id="closeLogin" aria-label="关闭">×</button>
        </div>
        <div class="qr-box" aria-label="微信登录二维码占位">
          <div></div>
        </div>
        <p>当前演示环境先提供模拟扫码登录。真实接入需要微信开放平台 AppID、授权回调域名、后端换取 access_token。</p>
        <button class="primary-btn" id="mockWechatLogin">模拟扫码成功</button>
      </div>
    </div>

    <script src="./src/core/common.js"></script>
    <script src="./src/core/api.js"></script>
    <script src="./src/pages/profile.js"></script>
  </body>
</html>
